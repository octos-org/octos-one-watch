# Nightly pipeline for octos-app — slower paths the per-PR lane skips.
#
# Same path-dep strategy as ci.yml: octos-app (binary) is excluded; we run
# only against store / transport / render with `../octos` and `../aichat`
# cloned as siblings. No live smoke (no live server in CI). See ci.yml
# header comment for rationale.
name: Nightly

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release-tests-and-docs:
    name: release tests + docs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout octos-app
        uses: actions/checkout@v4
        with:
          path: octos-app

      # See ci.yml for the rationale on sibling clones + repo-var setup.
      - name: Checkout octos
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.OCTOS_REPO }}
          ref: ${{ vars.OCTOS_REF || 'main' }}
          path: octos
          token: ${{ secrets.OCTOS_REPO_TOKEN || github.token }}

      - name: Checkout aichat
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AICHAT_REPO }}
          ref: ${{ vars.AICHAT_REF || 'main' }}
          path: aichat
          token: ${{ secrets.AICHAT_REPO_TOKEN || github.token }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: octos-app
          key: nightly

      - name: cargo test --workspace --release
        working-directory: octos-app
        run: cargo test --workspace --exclude octos-app --release

      - name: cargo doc --workspace --no-deps
        working-directory: octos-app
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --exclude octos-app --no-deps

      # TODO(W10): publish target/doc to a `gh-pages-docs` branch via
      # peaceiris/actions-gh-pages@v3 once docs settle. Skipped today so
      # the runner footprint stays lean and we don't churn pages.
