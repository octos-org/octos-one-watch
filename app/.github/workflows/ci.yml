# Per-PR CI lane for octos-app.
#
# Path-dep strategy (option (c) per W10 § "CI configuration"): the binary
# crate `octos-app` path-deps into ../aichat (Makepad fork) and ../octos
# (octos-core). Sibling cloning that fork on every CI run is heavy; the
# binary itself adds little testable surface beyond the three internal
# crates. We therefore *exclude* `octos-app` from CI and run check + test
# on store / transport / render only. We still need `../octos/crates/
# octos-core` because store and transport depend on it; the workflow
# clones it as a sibling before running cargo. The aichat path-dep is
# only consumed by the binary, but cargo loads every workspace member
# manifest at parse time, so we shallow-clone aichat too as a parse-time
# stub. Re-enabling the binary in CI is a follow-up tracked by W09.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-test:
    name: check + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout octos-app
        uses: actions/checkout@v4
        with:
          path: octos-app

      # Sibling clones to satisfy workspace path-deps. Set repo vars in
      # the GitHub project settings (`vars.OCTOS_REPO`, `vars.AICHAT_REPO`)
      # plus PATs in `secrets.OCTOS_REPO_TOKEN` / `secrets.AICHAT_REPO_TOKEN`
      # before the first run. Pinned to default branches; tighten to
      # specific commits before M2 freeze.
      - name: Checkout octos (octos-core path-dep)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.OCTOS_REPO }}
          ref: ${{ vars.OCTOS_REF || 'main' }}
          path: octos
          token: ${{ secrets.OCTOS_REPO_TOKEN || github.token }}

      - name: Checkout aichat (Makepad fork, parse-time only)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AICHAT_REPO }}
          ref: ${{ vars.AICHAT_REF || 'main' }}
          path: aichat
          token: ${{ secrets.AICHAT_REPO_TOKEN || github.token }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: octos-app

      - name: cargo fmt --check (advisory)
        working-directory: octos-app
        continue-on-error: true
        # Per-package: `--all` would walk into `../aichat` path-deps where
        # the upstream Makepad fork has its own formatting policy.
        run: cargo fmt -p octos-app -p octos-app-store -p octos-app-transport -p octos-app-render -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: octos-app
        run: cargo clippy --workspace --all-targets --exclude octos-app -- -D warnings

      - name: cargo check --workspace
        working-directory: octos-app
        run: cargo check --workspace --exclude octos-app

      - name: cargo test --workspace
        working-directory: octos-app
        # `live_smoke` is `#[ignore]`-gated so it stays out of the default
        # set; nothing else needs gating here.
        run: cargo test --workspace --exclude octos-app
